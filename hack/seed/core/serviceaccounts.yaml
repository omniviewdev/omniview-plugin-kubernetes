# Service account for monitoring/logging workloads
apiVersion: v1
kind: ServiceAccount
metadata:
  name: monitoring-sa
  namespace: omniview-test-apps
  annotations:
    description: "Service account for monitoring and logging DaemonSets"
automountServiceAccountToken: true
---
# Service account for batch job execution
apiVersion: v1
kind: ServiceAccount
metadata:
  name: batch-runner
  namespace: omniview-test-batch
  annotations:
    description: "Service account for batch job execution"
automountServiceAccountToken: false
