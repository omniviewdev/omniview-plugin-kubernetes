apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: data-pvc
  namespace: omniview-test-apps
  annotations:
    description: "PVC bound to hostpath data PV"
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: manual
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pending-pvc
  namespace: omniview-test-apps
  annotations:
    description: "PVC that will stay pending (no matching PV)"
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: nonexistent-class
  resources:
    requests:
      storage: 100Gi
