# Database credentials for the demo environment
apiVersion: v1
kind: Secret
metadata:
  name: db-credentials
  namespace: omniview-test-apps
  annotations:
    description: "Database credentials (simulated for demo)"
type: Opaque
stringData:
  username: boutique-admin
  password: demo-password-123
  connection-string: "redis://redis-cart.omniview-test-apps.svc.cluster.local:6379"
---
# Container registry pull secret
apiVersion: v1
kind: Secret
metadata:
  name: registry-credentials
  namespace: omniview-test-apps
  annotations:
    description: "Container registry pull secret"
type: kubernetes.io/dockerconfigjson
stringData:
  .dockerconfigjson: |
    {
      "auths": {
        "us-central1-docker.pkg.dev": {
          "username": "_json_key",
          "password": "placeholder-for-testing",
          "auth": "X2pzb25fa2V5OnBsYWNlaG9sZGVyLWZvci10ZXN0aW5n"
        }
      }
    }
---
