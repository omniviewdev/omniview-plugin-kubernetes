apiVersion: v1
kind: PersistentVolume
metadata:
  name: pv-hostpath-data
  annotations:
    description: "hostPath PV for general data storage"
spec:
  capacity:
    storage: 10Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: manual
  hostPath:
    path: /tmp/omniview-test/data
    type: DirectoryOrCreate
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: pv-hostpath-logs
  annotations:
    description: "hostPath PV for log storage"
spec:
  capacity:
    storage: 5Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Delete
  storageClassName: manual
  hostPath:
    path: /tmp/omniview-test/logs
    type: DirectoryOrCreate
