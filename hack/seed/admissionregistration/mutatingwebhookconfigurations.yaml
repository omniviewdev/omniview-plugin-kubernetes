apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: omniview-pod-defaults
  annotations:
    description: "Mutating webhook to inject defaults (dry-run, failurePolicy Ignore)"
webhooks:
  - name: defaults.pods.omniview.dev
    admissionReviewVersions: ["v1"]
    sideEffects: None
    failurePolicy: Ignore
    matchPolicy: Equivalent
    reinvocationPolicy: IfNeeded
    clientConfig:
      url: "https://webhook.example.com/mutate-pods"
    rules:
      - operations: ["CREATE"]
        apiGroups: [""]
        apiVersions: ["v1"]
        resources: ["pods"]
        scope: Namespaced
    namespaceSelector:
      matchLabels:
        omniview-webhook: enabled
